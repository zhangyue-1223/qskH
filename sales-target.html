          </div>

          <div class="space-y-6" id="target-list">
            <div class="target-item pb-5 border-b border-slate-100">
              <div class="flex items-center gap-3 mb-4">
                <label class="text-sm text-slate-600"><span class="target-select-label-text">选择部门</span> <span class="text-red-500">*</span></label>
                <div class="relative w-80">
                  <select class="w-full h-9 pl-3 pr-8 rounded border border-slate-200 text-sm bg-white appearance-none">

                    <option>销售二</option>
                    <option>销售三</option>
                  </select>
                  <i class="fa-solid fa-angle-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                </div>
              </div>

              <div class="flex flex-wrap items-center gap-x-4 gap-y-2 mb-4 text-sm">
                <span class="text-slate-600">设置方式 <span class="text-red-500">*</span></span>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-1" class="accent-blue-600" checked><span>按月设置</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-1" class="accent-blue-600"><span>按季度设</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-1" class="accent-blue-600"><span>按半年设</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-1" class="accent-blue-600"><span>按年设置</span></label>
              </div>

              <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-sm">
                <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">业绩目标 <span class="text-red-500">*</span></span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每月业绩金额</span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每月新增户数</span><input type="text" value="180000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每月续费户数</span><input type="text" value="186000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
              </div>
            </div>

            <div class="target-item pb-5 border-b border-slate-100">
              <div class="flex items-center gap-3 mb-4">
                <label class="text-sm text-slate-600"><span class="target-select-label-text">选择部门</span> <span class="text-red-500">*</span></label>
                <div class="relative w-80">
                  <select class="w-full h-9 pl-3 pr-8 rounded border border-slate-200 text-sm bg-white appearance-none">
                    <option>销售一</option>
                    <option selected>销售二</option>
                    <option>销售三</option>
                  </select>
                  <i class="fa-solid fa-angle-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                </div>
              </div>

              <div class="flex flex-wrap items-center gap-x-4 gap-y-2 mb-4 text-sm">
                <span class="text-slate-600">设置方式 <span class="text-red-500">*</span></span>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-2" class="accent-blue-600"><span>按月设置</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-2" class="accent-blue-600" checked><span>按季度设</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-2" class="accent-blue-600"><span>按半年设</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-2" class="accent-blue-600"><span>按年设置</span></label>
              </div>

              <div class="flex items-end gap-3">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-sm flex-1">
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">业绩目标 <span class="text-red-500">*</span></span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每季度业绩金</span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每季度新增户</span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每季度续费户</span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                </div>
                <button type="button" class="h-8 w-8 rounded border border-slate-200 text-slate-400 hover:text-red-500 hover:border-red-200">
                  <i class="fa-regular fa-trash-can"></i>
                </button>
              </div>
            </div>

            <div class="target-item pb-5 border-b border-slate-100">
              <div class="flex items-center gap-3 mb-4">
                <label class="text-sm text-slate-600"><span class="target-select-label-text">选择部门</span> <span class="text-red-500">*</span></label>
                <div class="relative w-80">
                  <select class="w-full h-9 pl-3 pr-8 rounded border border-slate-200 text-sm bg-white appearance-none">
                    <option>销售一</option>
                    <option>销售二</option>
                    <option selected>销售三</option>
                  </select>
                  <i class="fa-solid fa-angle-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                </div>
              </div>

              <div class="flex flex-wrap items-center gap-x-4 gap-y-2 mb-4 text-sm">
                <span class="text-slate-600">设置方式 <span class="text-red-500">*</span></span>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-3" class="accent-blue-600"><span>按月设置</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-3" class="accent-blue-600"><span>按季度设</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-3" class="accent-blue-600" checked><span>按半年设</span></label>
                <label class="inline-flex items-center gap-1.5"><input type="radio" name="mode-3" class="accent-blue-600"><span>按年设置</span></label>
              </div>

              <div class="flex items-end gap-3">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-3 text-sm flex-1">
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">业绩目标 <span class="text-red-500">*</span></span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每半年业绩金</span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每半年新增户</span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                  <label class="flex items-center gap-2"><span class="text-slate-600 whitespace-nowrap">每半年续费户</span><input type="text" value="188000" class="w-full h-8 px-2 rounded border border-slate-200"></label>
                </div>
                <button type="button" class="h-8 w-8 rounded border border-slate-200 text-slate-400 hover:text-red-500 hover:border-red-200">
                  <i class="fa-regular fa-trash-can"></i>
                </button>
              </div>
            </div>
          </div>

          <button type="button" class="text-sm text-blue-600 hover:underline mt-1"><i class="fa-solid fa-plus mr-1"></i>新增目标设置</button>

          <div class="mt-6 pl-1">
            <button type="button" id="btn-apply-target" class="h-10 px-12 rounded bg-blue-600 text-white text-sm font-medium hover:bg-blue-700">应用</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast-target-success" class="fixed top-6 left-1/2 -translate-x-1/2 z-[120] hidden px-5 py-2.5 rounded-lg bg-slate-800 text-white text-sm shadow-lg" role="status">应用成功</div>

  <script>
    (function () {
      var tabPerson = document.getElementById('tab-person-target');
      var tabDept = document.getElementById('tab-dept-target');
      var titleEl = document.getElementById('target-setting-title');
      var selectLabelEls = document.querySelectorAll('.target-select-label-text');

      function applyTargetTabCopy(isPerson) {
        if (titleEl) {
          titleEl.textContent = isPerson ? '人员目标设置' : '部门目标设置';
        }
        var labelText = isPerson ? '选择人员' : '选择部门';
        selectLabelEls.forEach(function (el) {
          el.textContent = labelText;
        });
      }

      if (tabPerson && tabDept) {
        tabPerson.addEventListener('click', function () {
          tabPerson.classList.add('border-blue-600', 'text-blue-600', 'font-medium');
          tabPerson.classList.remove('border-transparent', 'text-slate-500');
          tabDept.classList.remove('border-blue-600', 'text-blue-600', 'font-medium');
          tabDept.classList.add('border-transparent', 'text-slate-500');
          applyTargetTabCopy(true);
        });
        tabDept.addEventListener('click', function () {
          tabDept.classList.add('border-blue-600', 'text-blue-600', 'font-medium');
          tabDept.classList.remove('border-transparent', 'text-slate-500');
          tabPerson.classList.remove('border-blue-600', 'text-blue-600', 'font-medium');
          tabPerson.classList.add('border-transparent', 'text-slate-500');
          applyTargetTabCopy(false);
        });
      }

      var btnApply = document.getElementById('btn-apply-target');
      var toast = document.getElementById('toast-target-success');
      var timer;
      if (btnApply && toast) {
        btnApply.addEventListener('click', function () {
          toast.classList.remove('hidden');
          clearTimeout(timer);
          timer = setTimeout(function () {
            toast.classList.add('hidden');
          }, 2200);
        });
      }
    })();
  </script>
