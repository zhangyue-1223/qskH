        <div class="mb-2 flex items-center justify-between gap-2">
          <span class="font-medium text-slate-800">物品清单</span>
          <label class="inline-flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer">
            <input type="checkbox" id="transfer-check-all" class="rounded border-slate-300 text-blue-600">
            全选可移交项
          </label>
        </div>
        <div id="transfer-item-checklist" class="company-items-panel max-h-[320px] overflow-y-auto"></div>
      </div>
      <div class="flex justify-center gap-3 border-t border-slate-100 px-5 py-4 bg-slate-50/80 shrink-0">
        <button type="button" id="btn-transfer-copy-link" class="h-9 min-w-[100px] rounded-md bg-blue-600 text-sm font-medium text-white hover:bg-blue-700">复制链接</button>
        <button type="button" class="h-9 min-w-[90px] rounded-md border border-slate-300 bg-white text-sm text-slate-600 hover:bg-slate-50" data-close-transfer>取消</button>
      </div>
    </div>
  </div>

  <div id="modal-internal-transfer" class="fixed inset-0 z-[130] hidden items-center justify-center bg-slate-900/45 p-4">
    <div class="absolute inset-0" data-close-internal></div>
    <div class="relative w-full max-w-lg rounded-xl border border-slate-200 bg-white shadow-xl max-h-[90vh] overflow-y-auto">
      <div class="relative border-b border-slate-200 px-5 py-4 bg-slate-50/50 shrink-0">
        <h3 class="text-center text-base font-semibold text-slate-800">内部移交</h3>
        <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" data-close-internal aria-label="关闭"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <div class="px-6 py-5 text-sm">
        <div id="internal-company-summary" class="mb-4 rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 text-slate-800"></div>
        <div class="mb-2 flex items-center justify-between gap-2">
          <span class="font-medium text-slate-800">物品清单</span>
          <label class="inline-flex items-center gap-1.5 text-xs text-slate-600 cursor-pointer">
            <input type="checkbox" id="internal-check-all" class="rounded border-slate-300 text-blue-600">
            全选可移交项
          </label>
        </div>
        <div id="internal-item-checklist" class="company-items-panel max-h-[240px] overflow-y-auto mb-4"></div>
        <div class="flex items-center gap-3 pt-2 border-t border-slate-100">
          <label class="w-24 shrink-0 text-slate-600"><span class="text-red-500">*</span> 接收人</label>
          <div class="relative flex-1">
            <select id="internal-receiver" class="w-full h-9 pl-3 pr-8 rounded border border-slate-200 bg-white text-slate-700 appearance-none text-sm">
              <option selected>周方林</option>
              <option>陆琴</option>
              <option>马经理</option>
              <option>徐月</option>
            </select>
            <i class="fa-solid fa-angle-down absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs pointer-events-none"></i>
          </div>
        </div>
      </div>
      <div class="flex justify-center gap-3 border-t border-slate-100 px-5 py-4 bg-slate-50/30 shrink-0">
        <button type="button" id="btn-internal-transfer-ok" class="h-9 min-w-[90px] rounded-md bg-blue-600 text-sm font-medium text-white hover:bg-blue-700">确认</button>
        <button type="button" class="h-9 min-w-[90px] rounded-md border border-slate-300 bg-white text-sm text-slate-600 hover:bg-slate-50" data-close-internal>取消</button>
      </div>
    </div>
  </div>

  <div id="toast-customer-items" class="fixed top-6 left-1/2 z-[140] hidden -translate-x-1/2 rounded-lg bg-slate-800 px-5 py-2.5 text-sm text-white shadow-lg" role="status"></div>

  <script>
    (function () {
      var add = document.getElementById('modal-add-item');
      var append = document.getElementById('modal-append-items');
      var transfer = document.getElementById('modal-transfer-item');
      var internal = document.getElementById('modal-internal-transfer');
      var toastEl = document.getElementById('toast-customer-items');
      var addItemRows = document.getElementById('add-item-rows');
      var appendItemRows = document.getElementById('append-item-rows');
      var tbody = document.getElementById('customer-items-tbody');
      var currentCompanyId = null;
      var appendCompanyId = null;

      var transferStatusLabels = {
        pending: '未移交',
        customer: '已移交客户',
        internal: '已内部移交'
      };

      var companyStore = {
        'co-1': {
          id: 'co-1',
          company: '苏州没得食品公司',
          contact: '周总',
          phone: '15852262322',
          creator: '徐月',
          createdAt: '2026-04-15 09:12',
          items: [
            { id: 'item-1', name: '法人代表专用章（许月）', status: 'pending' },
            { id: 'item-2', name: '税控盘（客户）', status: 'customer', outDate: '2026-04-16' },
            { id: 'item-3', name: '法人代表专用财章（丽丽）', status: 'internal' }
          ]
        },
        'co-2': {
          id: 'co-2',
          company: '苏州怡启尔科技有限公司',
          contact: '李经理',
          phone: '13700112233',
          creator: '周方林',
          createdAt: '2026-04-12 16:30',
          confirmReceive: true,
          items: [
            { id: 'item-4', name: '营业执照副本', status: 'internal' }
          ]
        }
      };

      function toast(msg) {
        toastEl.textContent = msg;
        toastEl.classList.remove('hidden');
        clearTimeout(window._customerItemsToastT);
        window._customerItemsToastT = setTimeout(function () { toastEl.classList.add('hidden'); }, 2000);
      }

      function closeAdd() { add.classList.add('hidden'); add.classList.remove('flex'); }
      function closeAppend() { append.classList.add('hidden'); append.classList.remove('flex'); appendCompanyId = null; }
      function closeTransfer() { transfer.classList.add('hidden'); transfer.classList.remove('flex'); }
      function closeInternal() { internal.classList.add('hidden'); internal.classList.remove('flex'); }

      function nextItemId() {
        var max = 0;
        Object.keys(companyStore).forEach(function (cid) {
          companyStore[cid].items.forEach(function (it) {
            var m = /^item-(\d+)$/.exec(it.id);
            if (m) max = Math.max(max, parseInt(m[1], 10));
          });
        });
        return 'item-' + (max + 1);
      }

      function getCompany(id) {
        return companyStore[id] || null;
      }

      function buildTransferDetail(items) {
        var customer = 0;
        var internal = 0;
        var pending = 0;
        items.forEach(function (it) {
          if (it.status === 'customer') customer += 1;
          else if (it.status === 'internal') internal += 1;
          else pending += 1;
        });
        var parts = [];
        if (customer) parts.push('已移交客户 ' + customer + ' 件');
        if (internal) parts.push('已内部移交 ' + internal + ' 件');
        if (pending) parts.push('未移交 ' + pending + ' 件');
        return parts.length ? parts.join(' · ') : '—';
      }

      function renderItemListTags(items) {
        return items.map(function (it) {
          var cls = 'item-list-tag';
          if (it.status === 'customer' || it.status === 'internal') cls += ' is-done';
          else cls += ' is-pending';
          return '<span class="' + cls + '">' + it.name + '</span>';
        }).join('');
      }

      function companyMatchesFilter(co) {
        var companyEl = document.getElementById('filter-company');
        var companyKw = companyEl ? companyEl.value.trim().toLowerCase() : '';
        if (!companyKw) return true;
        var companyHay = (co.company + co.contact + co.phone).toLowerCase();
        return companyHay.indexOf(companyKw) !== -1;
      }

      function renderTable() {
        if (!tbody) return;
        tbody.innerHTML = Object.keys(companyStore).filter(function (cid) {
          return companyMatchesFilter(companyStore[cid]);
        }).map(function (cid) {
          var co = companyStore[cid];
          var hasInternal = co.items.some(function (it) { return it.status === 'pending' || it.status === 'internal'; });
          var ops = '<button type="button" class="text-blue-600 hover:underline js-open-append-items">添加物品</button>' +
            '<span class="text-slate-300 px-1">|</span><button type="button" class="text-blue-600 hover:underline js-open-transfer">移交客户</button>';
          if (co.confirmReceive) {
            ops += '<span class="text-slate-300 px-1">|</span><button type="button" class="text-blue-600 hover:underline js-confirm-receive">确认接收</button>';
          } else if (hasInternal) {
            ops += '<span class="text-slate-300 px-1">|</span><button type="button" class="text-blue-600 hover:underline js-open-internal-transfer">内部移交</button>';
          }
          return '<tr class="hover:bg-slate-50 company-row" data-company-id="' + co.id + '">' +
            '<td class="px-3 py-3 border-b border-slate-100 font-medium">' + co.company + '</td>' +
            '<td class="px-3 py-3 border-b border-slate-100"><div>' + co.contact + '</div><div class="text-xs text-slate-500 tabular-nums mt-0.5">' + co.phone + '</div></td>' +
            '<td class="px-3 py-3 border-b border-slate-100">' + renderItemListTags(co.items) + '</td>' +
            '<td class="px-3 py-3 border-b border-slate-100">' + co.creator + '</td>' +
            '<td class="px-3 py-3 border-b border-slate-100 text-xs text-slate-600">' + buildTransferDetail(co.items) + '</td>' +
            '<td class="px-3 py-3 border-b border-slate-100 whitespace-nowrap">' + co.createdAt + '</td>' +
            '<td class="px-3 py-3 border-b border-slate-100 whitespace-nowrap">' + ops + '</td></tr>';
        }).join('');
      }

      function renderCompanySummary(el, co) {
        if (!el || !co) return;
        el.innerHTML =
          '<p class="text-sm font-medium text-slate-800">' + co.company + '</p>' +
          '<p class="text-xs text-slate-500 mt-1">' + co.contact + ' · ' + co.phone + ' · 创建人 ' + co.creator + '</p>';
      }

      function canTransferToCustomer(item) {
        return item.status !== 'customer';
      }

      function canInternalTransfer(item) {
        return item.status === 'pending';
      }

      function renderItemChecklist(container, co, mode) {
        if (!container || !co) return;
        var canCheck = mode === 'transfer' ? canTransferToCustomer : canInternalTransfer;
        if (!co.items.length) {
          container.innerHTML = '<p class="p-3 text-slate-400 text-sm">暂无物品</p>';
          return;
        }
        container.innerHTML = co.items.map(function (it) {
          var enabled = canCheck(it);
          var label = transferStatusLabels[it.status] || '未移交';
          return '<label class="item-check-row' + (enabled ? '' : ' is-disabled') + '">' +
            '<input type="checkbox" class="item-transfer-check" data-item-id="' + it.id + '" ' +
            (enabled ? '' : 'disabled ') + (enabled ? 'checked' : '') + '>' +
            '<span class="flex-1 min-w-0"><span class="text-slate-800">' + it.name + '</span>' +
            '<span class="text-xs text-slate-500 ml-2">' + label + '</span></span></label>';
        }).join('');
      }

      function getCheckedItemIds(container) {
        if (!container) return [];
        return Array.prototype.slice.call(container.querySelectorAll('.item-transfer-check:checked')).map(function (el) {
          return el.getAttribute('data-item-id');
        });
      }

      function syncCheckAll(container, checkAllEl, mode) {
        if (!container || !checkAllEl) return;
        var boxes = container.querySelectorAll('.item-transfer-check:not(:disabled)');
        var checked = container.querySelectorAll('.item-transfer-check:not(:disabled):checked');
        checkAllEl.checked = boxes.length > 0 && checked.length === boxes.length;
        checkAllEl.indeterminate = checked.length > 0 && checked.length < boxes.length;
      }

      function openTransferModal(companyId) {
        currentCompanyId = companyId;
        var co = getCompany(companyId);
        if (!co) return;
        renderCompanySummary(document.getElementById('transfer-company-summary'), co);
        var listEl = document.getElementById('transfer-item-checklist');
        renderItemChecklist(listEl, co, 'transfer');
        var checkAll = document.getElementById('transfer-check-all');
        if (checkAll) {
          checkAll.checked = false;
          checkAll.indeterminate = false;
        }
        syncCheckAll(listEl, checkAll, 'transfer');
        transfer.classList.remove('hidden');
        transfer.classList.add('flex');
      }

      function openInternalModal(companyId) {
        currentCompanyId = companyId;
        var co = getCompany(companyId);
        if (!co) return;
        renderCompanySummary(document.getElementById('internal-company-summary'), co);
        var listEl = document.getElementById('internal-item-checklist');
        renderItemChecklist(listEl, co, 'internal');
        var checkAll = document.getElementById('internal-check-all');
        if (checkAll) {
          checkAll.checked = false;
          checkAll.indeterminate = false;
        }
        syncCheckAll(listEl, checkAll, 'internal');
        internal.classList.remove('hidden');
        internal.classList.add('flex');
      }

      function updateItemsStatus(companyId, itemIds, newStatus) {
        var co = companyStore[companyId];
        if (!co) return;
        co.items.forEach(function (it) {
          if (itemIds.indexOf(it.id) !== -1) it.status = newStatus;
        });
        renderTable();
      }

      function syncAddItemRemoveButtons() {
        if (!addItemRows) return;
        var rows = addItemRows.querySelectorAll('.add-item-row');
        rows.forEach(function (row, idx) {
          var btn = row.querySelector('.add-item-remove');
          if (btn) btn.classList.toggle('hidden', rows.length <= 1);
        });
      }

      function createAddItemRow() {
        var row = document.createElement('div');
        row.className = 'add-item-row flex items-center gap-3';
        row.innerHTML =
          '<label class="w-24 shrink-0 text-right text-slate-600"><span class="text-red-500">*</span> 物品名称</label>' +
          '<div class="relative flex-1 flex items-center gap-2 min-w-0">' +
          '<input type="text" class="add-item-name-input flex-1 min-w-0 h-9 rounded border border-slate-200 px-3 text-sm text-slate-700" list="add-item-name-datalist" placeholder="请选择或输入物品名称" autocomplete="off">' +
          '<button type="button" class="add-item-remove shrink-0 text-xs text-slate-500 hover:text-red-600 whitespace-nowrap">删除</button></div>';
        return row;
      }

      function resetAddItemForm() {
        if (addItemRows) {
          addItemRows.innerHTML = '';
          addItemRows.appendChild(createAddItemRow());
          syncAddItemRemoveButtons();
        }
      }

      function createAppendItemRow() {
        var row = document.createElement('div');
        row.className = 'append-item-row flex items-center gap-3';
        row.innerHTML =
          '<label class="w-24 shrink-0 text-right text-slate-600"><span class="text-red-500">*</span> 物品名称</label>' +
          '<div class="relative flex-1 flex items-center gap-2 min-w-0">' +
          '<input type="text" class="append-item-name-input flex-1 min-w-0 h-9 rounded border border-slate-200 px-3 text-sm text-slate-700" list="add-item-name-datalist" placeholder="请选择或输入物品名称" autocomplete="off">' +
          '<button type="button" class="append-item-remove shrink-0 text-xs text-slate-500 hover:text-red-600 whitespace-nowrap">删除</button></div>';
        return row;
      }

      function syncAppendItemRemoveButtons() {
        if (!appendItemRows) return;
        var rows = appendItemRows.querySelectorAll('.append-item-row');
        rows.forEach(function (row) {
          var btn = row.querySelector('.append-item-remove');
          if (btn) btn.classList.toggle('hidden', rows.length <= 1);
        });
      }

      function resetAppendItemForm() {
        if (appendItemRows) {
          appendItemRows.innerHTML = '';
          appendItemRows.appendChild(createAppendItemRow());
          syncAppendItemRemoveButtons();
        }
      }

      function openAppendItemsModal(companyId) {
        var co = getCompany(companyId);
        if (!co) return;
        appendCompanyId = companyId;
        var hint = document.getElementById('append-items-company-hint');
        if (hint) hint.textContent = '为「' + co.company + '」添加物品，可一次添加多件';
        resetAppendItemForm();
        append.classList.remove('hidden');
        append.classList.add('flex');
      }

      function appendItemsToCompany(companyId, names) {
        var co = companyStore[companyId];
        if (!co || !names.length) return;
        names.forEach(function (name) {
          co.items.push({ id: nextItemId(), name: name, status: 'pending' });
        });
        renderTable();
      }

      document.getElementById('btn-open-add-item').addEventListener('click', function () {
        resetAddItemForm();
        add.classList.remove('hidden');
        add.classList.add('flex');
      });
      add.querySelectorAll('[data-close-add]').forEach(function (el) {
        el.addEventListener('click', closeAdd);
      });
      if (append) {
        append.querySelectorAll('[data-close-append]').forEach(function (el) {
          el.addEventListener('click', closeAppend);
        });
      }

      var btnAppendItemRow = document.getElementById('btn-append-item-row');
      if (btnAppendItemRow && appendItemRows) {
        btnAppendItemRow.addEventListener('click', function () {
          appendItemRows.appendChild(createAppendItemRow());
          syncAppendItemRemoveButtons();
        });
        appendItemRows.addEventListener('click', function (e) {
          var btn = e.target.closest('.append-item-remove');
          if (!btn) return;
          var rows = appendItemRows.querySelectorAll('.append-item-row');
          if (rows.length <= 1) return;
          btn.closest('.append-item-row').remove();
          syncAppendItemRemoveButtons();
        });
      }

      document.getElementById('btn-append-items-ok').addEventListener('click', function () {
        var inputs = appendItemRows ? appendItemRows.querySelectorAll('.append-item-name-input') : [];
        var names = [];
        inputs.forEach(function (inp) {
          var v = inp.value.trim();
          if (v) names.push(v);
        });
        if (!appendCompanyId) return;
        if (!names.length) {
          toast('请至少添加一件物品');
          return;
        }
        appendItemsToCompany(appendCompanyId, names);
        closeAppend();
        toast('已为该企业添加 ' + names.length + ' 件物品');
      });

      var btnAddItemRow = document.getElementById('btn-add-item-row');
      if (btnAddItemRow && addItemRows) {
        btnAddItemRow.addEventListener('click', function () {
          addItemRows.appendChild(createAddItemRow());
          syncAddItemRemoveButtons();
        });
        addItemRows.addEventListener('click', function (e) {
          var btn = e.target.closest('.add-item-remove');
          if (!btn) return;
          var rows = addItemRows.querySelectorAll('.add-item-row');
          if (rows.length <= 1) return;
          btn.closest('.add-item-row').remove();
          syncAddItemRemoveButtons();
        });
      }

      var btnFilterSearch = document.getElementById('btn-filter-search');
      var btnFilterReset = document.getElementById('btn-filter-reset');
      if (btnFilterSearch) {
        btnFilterSearch.addEventListener('click', function () { renderTable(); });
      }
      if (btnFilterReset) {
        btnFilterReset.addEventListener('click', function () {
          ['filter-company'].forEach(function (id) {
            var el = document.getElementById(id);
            if (el) el.value = '';
          });
          renderTable();
        });
      }

      document.getElementById('btn-add-item-ok').addEventListener('click', function () {
        var company = document.getElementById('add-company');
        var names = addItemRows ? addItemRows.querySelectorAll('.add-item-name-input') : [];
        var filled = 0;
        names.forEach(function (inp) { if (inp.value.trim()) filled += 1; });
        if (!company || !company.value) {
          toast('请选择企业名称');
          return;
        }
        if (!filled) {
          toast('请至少添加一件物品');
          return;
        }
        closeAdd();
        toast('已保存 ' + filled + ' 件物品');
      });

      if (tbody) {
        tbody.addEventListener('click', function (e) {
          var row = e.target.closest('.company-row');
          if (!row) return;
          var cid = row.getAttribute('data-company-id');
          if (e.target.closest('.js-open-append-items')) {
            e.preventDefault();
            openAppendItemsModal(cid);
          }
          if (e.target.closest('.js-open-transfer')) {
            e.preventDefault();
            openTransferModal(cid);
          }
          if (e.target.closest('.js-open-internal-transfer')) {
            e.preventDefault();
            openInternalModal(cid);
          }
          if (e.target.closest('.js-confirm-receive')) {
            e.preventDefault();
            var co = getCompany(cid);
            if (!co || !co.confirmReceive) return;
            co.items.forEach(function (it) {
              if (it.status === 'internal') it.status = 'pending';
            });
            co.confirmReceive = false;
            renderTable();
            toast('接收成功');
          }
        });
      }

      var transferList = document.getElementById('transfer-item-checklist');
      var transferCheckAll = document.getElementById('transfer-check-all');
      if (transferList) {
        transferList.addEventListener('change', function (e) {
          if (e.target.classList.contains('item-transfer-check')) {
            syncCheckAll(transferList, transferCheckAll, 'transfer');
          }
        });
      }
      if (transferCheckAll && transferList) {
        transferCheckAll.addEventListener('change', function () {
          transferList.querySelectorAll('.item-transfer-check:not(:disabled)').forEach(function (cb) {
            cb.checked = transferCheckAll.checked;
          });
          syncCheckAll(transferList, transferCheckAll, 'transfer');
        });
      }

      var internalList = document.getElementById('internal-item-checklist');
      var internalCheckAll = document.getElementById('internal-check-all');
      if (internalList) {
        internalList.addEventListener('change', function (e) {
          if (e.target.classList.contains('item-transfer-check')) {
            syncCheckAll(internalList, internalCheckAll, 'internal');
          }
        });
      }
      if (internalCheckAll && internalList) {
        internalCheckAll.addEventListener('change', function () {
          internalList.querySelectorAll('.item-transfer-check:not(:disabled)').forEach(function (cb) {
            cb.checked = internalCheckAll.checked;
          });
          syncCheckAll(internalList, internalCheckAll, 'internal');
        });
      }

      transfer.querySelectorAll('[data-close-transfer]').forEach(function (el) {
        el.addEventListener('click', closeTransfer);
      });
      document.getElementById('btn-transfer-copy-link').addEventListener('click', function () {
        var ids = getCheckedItemIds(transferList);
        if (!ids.length) {
          toast('请至少勾选一件待移交物品');
          return;
        }
        var co = getCompany(currentCompanyId);
        var names = co ? co.items.filter(function (it) { return ids.indexOf(it.id) !== -1; }).map(function (it) { return it.name; }) : [];
        updateItemsStatus(currentCompanyId, ids, 'customer');
        var shareUrl = (typeof location !== 'undefined' && location.href && !/^file:/i.test(location.href))
          ? (location.href.split('#')[0].replace(/\?.*$/, '') + '?share=demo&items=' + encodeURIComponent(names.join(',')))
          : 'https://platform.example.com/delivery/customer-items/share/demo';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(shareUrl).then(function () {
            toast('已复制移交链接（' + names.length + ' 件物品）');
            closeTransfer();
          }).catch(function () { toast('链接已复制'); closeTransfer(); });
        } else {
          toast('已复制移交链接（' + names.length + ' 件物品）');
          closeTransfer();
        }
      });

      internal.querySelectorAll('[data-close-internal]').forEach(function (el) {
        el.addEventListener('click', closeInternal);
      });
      document.getElementById('btn-internal-transfer-ok').addEventListener('click', function () {
        var ids = getCheckedItemIds(internalList);
        if (!ids.length) {
          toast('请至少勾选一件待内部移交物品');
          return;
        }
        var receiver = document.getElementById('internal-receiver');
        if (!receiver || !receiver.value) {
          toast('请选择接收人');
          return;
        }
        updateItemsStatus(currentCompanyId, ids, 'internal');
        closeInternal();
        toast('已将 ' + ids.length + ' 件物品内部移交给「' + receiver.value + '」');
      });

      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Escape') return;
        closeAdd();
        closeAppend();
        closeTransfer();
        closeInternal();
      });

      renderTable();
      resetAddItemForm();
    })();
  </script>
  <script src="./assets/app-shell.js"></script>
</body>
</html>
