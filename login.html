<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>企税康 - 员工登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    .login-bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.55;
    }
  </style>
</head>
<body class="min-h-screen m-0">
  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- 左侧：品牌与插画 -->
    <div class="relative flex-1 min-h-[42vh] lg:min-h-screen overflow-hidden bg-gradient-to-br from-sky-200 via-sky-100 to-blue-100">
      <div class="login-bg-blob w-[120%] h-64 -top-20 -left-1/4 bg-white/80"></div>
      <div class="login-bg-blob w-96 h-96 top-1/3 right-0 bg-sky-300/40"></div>
      <div class="login-bg-blob w-80 h-80 bottom-0 left-1/4 bg-blue-200/50"></div>
      <svg class="absolute inset-0 w-full h-full opacity-30 pointer-events-none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="curveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:0.9" />
            <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:0.3" />
          </linearGradient>
        </defs>
        <path fill="none" stroke="url(#curveGrad)" stroke-width="3" d="M-50 200 Q 200 80 450 180 T 900 120" />
        <path fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" d="M-30 320 Q 180 200 400 280 T 850 240" />
      </svg>

      <div class="relative z-10 h-full min-h-[42vh] lg:min-h-screen flex flex-col px-8 py-10 lg:px-14 lg:py-12">
        <div class="shrink-0 max-w-xl">
          <img src="./assets/qishuikang-logo.png" alt="企税康" class="h-11 w-auto object-contain object-left mix-blend-multiply">
          <h1 class="mt-10 text-2xl lg:text-3xl font-semibold text-slate-700 leading-snug">
            欢迎回来，开启高效一天
          </h1>
          <p class="mt-3 text-slate-500 text-sm lg:text-base">
            登录，进入你的专属工作台
          </p>
        </div>
        <div class="flex-1 flex items-center justify-center min-h-0 w-full py-8 lg:py-10">
          <img src="./assets/login-hero.png" alt="企税康协同平台"
            class="w-full max-w-2xl lg:max-w-4xl xl:max-w-5xl max-h-[58vh] lg:max-h-[72vh] object-contain object-center drop-shadow-xl select-none pointer-events-none"
            draggable="false">
        </div>
      </div>
    </div>

    <!-- 右侧：登录卡片 -->
    <div class="flex-1 flex items-center justify-center p-6 lg:p-12 bg-slate-50/80 lg:bg-white">
      <div class="w-full max-w-md rounded-2xl bg-white p-8 lg:p-10 shadow-xl shadow-slate-200/80 border border-slate-100">
        <div class="flex items-center gap-3 mb-6">
          <img src="./assets/qishuikang-logo.png" alt="" class="h-10 w-auto object-contain mix-blend-multiply">
          <span class="text-slate-700 font-semibold text-lg">企税康 · 员工登录</span>
        </div>

        <p class="text-sm font-medium text-blue-500 mb-6">密码登录</p>

        <form id="login-form" class="space-y-4" action="index.html" method="get">
          <div>
            <label class="sr-only" for="employee-id">工号</label>
            <input id="employee-id" name="uid" type="text" autocomplete="username"
              class="w-full h-11 px-4 rounded-lg border border-slate-200 text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-400/40 focus:border-blue-400"
              placeholder="请输入您的工号">
          </div>
          <div class="relative">
            <label class="sr-only" for="password">密码</label>
            <input id="password" name="pwd" type="password" autocomplete="current-password"
              class="w-full h-11 px-4 pr-11 rounded-lg border border-slate-200 text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-400/40 focus:border-blue-400"
              placeholder="请输入密码">
            <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 p-1" aria-label="显示或隐藏密码">
              <i class="fa-regular fa-eye" id="toggle-pwd-icon"></i>
            </button>
          </div>
          <button type="submit"
            class="w-full h-11 rounded-lg bg-slate-400 hover:bg-slate-500 text-white text-sm font-medium transition-colors shadow-sm">
            登录
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var form = document.getElementById('login-form');
      var pwd = document.getElementById('password');
      var toggle = document.getElementById('toggle-pwd');
      var icon = document.getElementById('toggle-pwd-icon');
      if (toggle && pwd && icon) {
        toggle.addEventListener('click', function () {
          var isPwd = pwd.type === 'password';
          pwd.type = isPwd ? 'text' : 'password';
          icon.className = isPwd ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
        });
      }
      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          window.location.href = 'index.html';
        });
      }
    })();
  </script>
</body>
</html>
