          <div class="flex flex-wrap items-center gap-y-2 py-2.5 text-sm px-2">
            <label class="flex w-36 shrink-0 items-center gap-2 px-2 cursor-pointer">
              <input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600"><span class="text-slate-800">字典管理</span>
            </label>
            <div class="hidden sm:block w-px h-5 bg-slate-200 shrink-0 mx-1"></div>
            <div class="flex flex-1 flex-wrap gap-x-4 gap-y-1 text-slate-600 pl-1 sm:pl-0">
              <label class="inline-flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600">查看</label>
              <label class="inline-flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600">新增</label>
              <label class="inline-flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600">编辑</label>
              <label class="inline-flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600">删除</label>
            </div>
          </div>
          <div class="flex flex-wrap items-center gap-y-2 py-2.5 text-sm px-2">
            <label class="flex w-36 shrink-0 items-center gap-2 px-2 cursor-pointer">
              <input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600"><span class="text-slate-800">菜单管理</span>
            </label>
            <div class="hidden sm:block w-px h-5 bg-slate-200 shrink-0 mx-1"></div>
            <div class="flex flex-1 flex-wrap gap-x-4 gap-y-1 text-slate-600 pl-1 sm:pl-0">
              <label class="inline-flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600">查看</label>
              <label class="inline-flex items-center gap-1.5 cursor-pointer"><input type="checkbox" class="h-3.5 w-3.5 rounded border-slate-300 text-blue-600">编辑</label>
            </div>
          </div>
        </div>
      </section>
    </div>
  </template>

  <div id="modal-add-role" class="fixed inset-0 z-[130] hidden items-center justify-center bg-slate-900/45 p-4" aria-hidden="true">
    <div class="absolute inset-0" data-close-add-role></div>
    <div class="relative w-full max-w-md rounded-xl border border-slate-200 bg-white shadow-xl">
      <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
        <h3 class="text-base font-semibold text-slate-800">新增角色</h3>
        <button type="button" class="text-slate-400 hover:text-slate-600" data-close-add-role aria-label="关闭"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <div class="px-5 py-4 space-y-4 text-sm">
        <label class="block">
          <span class="text-slate-600">角色名称 <span class="text-red-500">*</span></span>
          <input type="text" id="new-role-name" placeholder="请输入角色名称" class="mt-1 h-9 w-full rounded-md border border-slate-200 px-3">
        </label>
        <label class="block">
          <span class="text-slate-600">备注</span>
          <textarea rows="3" placeholder="选填" class="mt-1 w-full rounded-md border border-slate-200 px-3 py-2 resize-none"></textarea>
        </label>
      </div>
      <div class="flex justify-end gap-2 border-t border-slate-100 px-5 py-4">
        <button type="button" class="h-9 rounded-md border border-slate-300 bg-white px-4 text-sm text-slate-600 hover:bg-slate-50" data-close-add-role>取消</button>
        <button type="button" class="h-9 rounded-md bg-blue-600 px-4 text-sm font-medium text-white hover:bg-blue-700" id="btn-submit-role">确定</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var tpl = document.getElementById('perm-tpl');
      var panelRole = document.getElementById('panel-role-perm');
      var panelEmp = document.getElementById('panel-emp-perm');

      panelRole.appendChild(tpl.content.cloneNode(true));

      var empFrag = tpl.content.cloneNode(true);
      var n = 0;
      empFrag.querySelectorAll('.js-mod-select-all').forEach(function (cb) {
        cb.classList.remove('js-mod-select-all');
        cb.classList.add('js-emp-mod-select-all');
      });
      empFrag.querySelectorAll('input[type="checkbox"]').forEach(function (inp) {
        inp.name = 'emp_perm_' + (n++);
      });
      panelEmp.appendChild(empFrag);

      function bindModSelectAll(root, klass) {
        root.querySelectorAll('.' + klass).forEach(function (master) {
          master.addEventListener('change', function () {
            var mod = master.closest('.perm-module');
            if (!mod) return;
            mod.querySelectorAll('input[type="checkbox"]').forEach(function (c) {
              if (c !== master) c.checked = master.checked;
            });
          });
        });
      }
      bindModSelectAll(panelRole, 'js-mod-select-all');
      bindModSelectAll(panelEmp, 'js-emp-mod-select-all');

      function syncModuleMaster(mod) {
        var master = mod.querySelector('.js-mod-select-all, .js-emp-mod-select-all');
        if (!master) return;
        var boxes = mod.querySelectorAll('input[type="checkbox"]');
        var children = [];
        boxes.forEach(function (c) {
          if (c !== master) children.push(c);
        });
        if (!children.length) return;
        var checked = 0;
        children.forEach(function (c) {
          if (c.checked) checked++;
        });
        master.checked = checked === children.length;
        master.indeterminate = checked > 0 && checked < children.length;
      }

      function bindModuleMasterSync(root) {
        root.querySelectorAll('.perm-module').forEach(function (mod) {
          syncModuleMaster(mod);
          mod.querySelectorAll('input[type="checkbox"]').forEach(function (cb) {
            cb.addEventListener('change', function () {
              syncModuleMaster(mod);
            });
          });
        });
      }
      bindModuleMasterSync(panelRole);
      bindModuleMasterSync(panelEmp);

      function bindSubModRowMasters(root) {
        root.querySelectorAll('.perm-module .divide-y > div').forEach(function (row) {
          var master = row.querySelector('label.flex.w-36 input[type="checkbox"]');
          var actionsWrap = row.querySelector('.flex.flex-1.flex-wrap');
          if (!master || !actionsWrap) return;
          var opBoxes = actionsWrap.querySelectorAll('input[type="checkbox"]');
          if (!opBoxes.length) return;

          master.addEventListener('change', function () {
            opBoxes.forEach(function (c) {
              c.checked = master.checked;
            });
            master.indeterminate = false;
          });

          function syncMasterFromOps() {
            var checkedCount = 0;
            opBoxes.forEach(function (c) {
              if (c.checked) checkedCount++;
            });
            master.checked = checkedCount === opBoxes.length;
            master.indeterminate = checkedCount > 0 && checkedCount < opBoxes.length;
          }

          opBoxes.forEach(function (c) {
            c.addEventListener('change', syncMasterFromOps);
          });
        });
      }
      bindSubModRowMasters(panelRole);
      bindSubModRowMasters(panelEmp);

      var tabRole = document.getElementById('tab-role-perm');
      var tabEmp = document.getElementById('tab-emp-perm');
      function activatePermTab(which) {
        var isRole = which === 'role';
        panelRole.classList.toggle('hidden', !isRole);
        panelEmp.classList.toggle('hidden', isRole);
        tabRole.classList.toggle('perm-tab-active', isRole);
        tabEmp.classList.toggle('perm-tab-active', !isRole);
      }
      tabRole.addEventListener('click', function () { activatePermTab('role'); });
      tabEmp.addEventListener('click', function () { activatePermTab('emp'); });

      var roleList = document.getElementById('role-list');
      var roleIdle = 'js-role-item flex w-full items-center justify-between rounded-lg px-3 py-2.5 text-left text-sm text-slate-700 hover:bg-slate-50';
      var roleActive = 'js-role-item flex w-full items-center justify-between rounded-lg px-3 py-2.5 text-left text-sm bg-sky-50 text-blue-700 font-medium ring-1 ring-inset ring-blue-100';

      roleList.querySelectorAll('.js-role-item').forEach(function (btn) {
        btn.addEventListener('click', function () {
          roleList.querySelectorAll('.js-role-item').forEach(function (b) {
            b.className = roleIdle;
            var slot = b.querySelector('.role-edit-icon');
            if (slot) slot.innerHTML = '';
          });
          btn.className = roleActive;
          var iconSlot = btn.querySelector('.role-edit-icon');
          if (iconSlot) iconSlot.innerHTML = '<i class="fa-solid fa-pen text-xs"></i>';
        });
      });

      var addModal = document.getElementById('modal-add-role');
      function openAddRole() {
        addModal.classList.remove('hidden');
        addModal.classList.add('flex');
        addModal.setAttribute('aria-hidden', 'false');
        document.getElementById('new-role-name').value = '';
      }
      function closeAddRole() {
        addModal.classList.add('hidden');
        addModal.classList.remove('flex');
        addModal.setAttribute('aria-hidden', 'true');
      }
      document.getElementById('btn-add-role').addEventListener('click', openAddRole);
      addModal.querySelectorAll('[data-close-add-role]').forEach(function (el) { el.addEventListener('click', closeAddRole); });
      document.getElementById('btn-submit-role').addEventListener('click', closeAddRole);

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && addModal && !addModal.classList.contains('hidden')) closeAddRole();
      });
    })();
  </script>
  <script src="./assets/app-shell.js"></script>
</body>
</html>
