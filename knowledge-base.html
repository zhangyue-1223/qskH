        { q: '如何提升自己的销售能力？', a: '销售能力的提升核心在于标准动作执行：会前预判、过程控节奏、会后及时复盘。', time: '2026-04-17', likes: 228, dept: 'sales', author: '周芳林', assignee: '', publishedAt: '2026-04-05 12:23', needsAnswer: true },
        { q: '顶级销售都是怎么说话的？', a: '先听后说，先复述再给方案，最后确认下一步行动。避免“泛表达”，多用“业务场景化表达”。同时在沟通中加入场景化案例，持续校准客户关注点，形成可执行的下一步计划。', time: '2026-04-17', likes: 22, dept: 'sales', author: '王磊', assignee: '马时笑', expandable: true },
        { q: '销售的最高境界是让客户说服自己', a: '通过提问引导客户明确痛点，再让客户自己说出目标与价值，成交会更顺畅。', time: '2026-04-17', likes: 22, dept: 'sales', author: '周芳林', assignee: '' },
        { q: '小规模纳税人申报有哪些注意事项？', a: '关注申报期限、发票额度与优惠政策适用条件，按月完成增值税及附加税费申报。', time: '2026-04-16', likes: 18, dept: 'accounting', author: '许悦', assignee: '' },
        { q: '政务服务窗口材料审核标准是什么？', a: '按事项清单核对材料完整性、真实性，缺件一次性告知补正。', time: '2026-04-15', likes: 31, dept: 'gov', author: '孙红', assignee: '孙红' }
      ];

      var docListEl = document.getElementById('doc-list');
      var docDeptTabsEl = document.getElementById('doc-dept-tabs');
      var qaDeptTabsEl = document.getElementById('qa-dept-tabs');
      var qaListEl = document.getElementById('qa-list');
      var qaTotalCountEl = document.getElementById('qa-total-count');
      var docContentEl = document.getElementById('doc-content');
      var docPanel = document.getElementById('doc-panel');
      var qaPanel = document.getElementById('qa-panel');
      var activeDocId = docs[0].id;

      function deptName(deptId) {
        var d = departments.find(function (x) { return x.id === deptId; });
        return d ? d.name : '—';
      }

      function filterByDept(list, deptKey) {
        if (activeDept === 'all') return list;
        return list.filter(function (item) { return item[deptKey] === activeDept; });
      }

      function renderDeptTabs(container) {
        if (!container) return;
        container.innerHTML = departments.map(function (d) {
          var active = d.id === activeDept ? 'kb-dept-tab-active' : '';
          return '<button type="button" class="kb-dept-tab ' + active + '" data-dept="' + d.id + '">' + d.name + '</button>';
        }).join('');
      }

      function bindDeptTabs(container) {
        if (!container || container._deptBound) return;
        container._deptBound = true;
        container.addEventListener('click', function (e) {
          var btn = e.target.closest('[data-dept]');
          if (!btn || !container.contains(btn)) return;
          activeDept = btn.getAttribute('data-dept');
          renderDeptTabs(docDeptTabsEl);
          renderDeptTabs(qaDeptTabsEl);
          renderDocs();
          renderQa();
        });
      }

      function renderDocs() {
        var filtered = filterByDept(docs, 'dept');
        if (filtered.length && !filtered.some(function (d) { return d.id === activeDocId; })) {
          activeDocId = filtered[0].id;
          renderDocContent();
        }
        if (!filtered.length) {
          docListEl.innerHTML = '<p class="px-3 py-6 text-center text-xs text-slate-400">该部门暂无文档</p>';
          return;
        }
        docListEl.innerHTML = filtered.map(function (d) {
          var icon = d.type === 'pdf' ? 'fa-file-pdf text-red-500' : (d.type === 'img' ? 'fa-file-image text-cyan-500' : 'fa-file-lines text-emerald-500');
          var active = d.id === activeDocId ? 'doc-item-active' : 'text-slate-600 hover:bg-slate-100';
          return '<button type="button" data-doc-id="' + d.id + '" class="w-full text-left px-3 py-2 rounded cursor-pointer transition-colors ' + active + '">' +
            '<span class="flex items-start gap-2">' +
            '<i class="fa-solid ' + icon + ' mt-0.5 text-xs shrink-0"></i>' +
            '<span class="min-w-0"><span class="block truncate">' + d.title + '</span>' +
            '<span class="text-[10px] text-slate-400">' + deptName(d.dept) + '</span></span></span></button>';
        }).join('');
      }

      function renderQa() {
        var filtered = filterByDept(qaList, 'dept');
        if (qaTotalCountEl) qaTotalCountEl.textContent = String(filtered.length);
        if (!filtered.length) {
          qaListEl.innerHTML = '<p class="py-12 text-center text-sm text-slate-400">该部门暂无问答内容</p>';
          return;
        }
        qaListEl.innerHTML = filtered.map(function (item) {
          var assigneeTag = item.assignee
            ? '<span class="inline-flex items-center rounded bg-amber-50 border border-amber-200 px-1.5 py-0.5 text-[10px] text-amber-700"><i class="fa-regular fa-user mr-0.5"></i>指定：' + item.assignee + '</span>'
            : '';
          var metaLine = deptName(item.dept) + '-' + (item.author || '周芳林') + ' 发布于' + (item.publishedAt || item.time);
          var answerHtml = '';
          if (item.a) {
            answerHtml = item.expandable
              ? '<p class="text-sm leading-7 text-slate-600">' + item.a + '<span class="ml-1 inline-block max-w-[360px] overflow-hidden text-ellipsis whitespace-nowrap align-middle text-slate-600">另外可从客户异议处理、需求确认话术和复盘方法三个维度继续深化。</span><button type="button" class="ml-1 text-sky-500 hover:underline text-xs align-middle cursor-pointer">展开阅读</button></p>'
              : '<p class="text-sm leading-7 text-slate-600">' + item.a + '</p>';
          }
          return '<div class="border-b border-slate-200 pb-4">' +
            '<div class="flex flex-wrap items-center gap-2 mb-2">' +
            '<span class="inline-flex rounded bg-slate-100 px-2 py-0.5 text-[10px] text-slate-600">' + deptName(item.dept) + '</span>' +
            assigneeTag +
            '</div>' +
            '<p class="text-base text-slate-800 mb-2">' + item.q + '</p>' +
            (item.needsAnswer ? '<button type="button" class="js-open-answer h-7 px-3 rounded-md bg-sky-500 text-white text-xs hover:bg-sky-600 cursor-pointer mb-2">去回答</button><p class="text-xs text-slate-400 mb-2 pb-2 border-b border-slate-200">' + metaLine + '</p>' : '') +
            answerHtml +
            '<div class="mt-2 text-xs text-slate-400 clearfix">' + (item.author || '周芳林') + ' · 更新于：' + item.time +
            '<span class="float-right text-sky-500 cursor-pointer"><i class="fa-solid fa-thumbs-up mr-1"></i>' + item.likes + '人觉得有用</span></div>' +
            '</div>';
        }).join('');
      }

      function renderDocContent() {
        var d = docs.find(function (x) { return x.id === activeDocId; });
        docContentEl.innerHTML = d ? d.content : '';
      }

      docListEl.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-doc-id]');
        if (!btn) return;
        activeDocId = btn.getAttribute('data-doc-id');
        renderDocs();
        renderDocContent();
        qaPanel.classList.add('hidden');
        docPanel.classList.remove('hidden');
      });

      renderDeptTabs(docDeptTabsEl);
      renderDeptTabs(qaDeptTabsEl);
      bindDeptTabs(docDeptTabsEl);
      bindDeptTabs(qaDeptTabsEl);
      renderDocs();
      renderQa();
      renderDocContent();
      qaPanel.classList.remove('hidden');
      docPanel.classList.add('hidden');

      var askModal = document.getElementById('modal-ask-question');
      var answerModal = document.getElementById('modal-answer-question');
      var askTextarea = document.getElementById('ask-content');
      var answerTextarea = document.getElementById('answer-content');
      var askCount = document.getElementById('ask-count');
      var answerCount = document.getElementById('answer-count');
      var openAskBtn = document.getElementById('btn-open-ask');

      function bindCounter(textarea, counter) {
        if (!textarea || !counter) return;
        function update() { counter.textContent = String(textarea.value.length); }
        textarea.addEventListener('input', update);
        update();
      }
      bindCounter(askTextarea, askCount);
      bindCounter(answerTextarea, answerCount);

      var askAssignee = document.getElementById('ask-assignee');

      if (openAskBtn) {
        openAskBtn.addEventListener('click', function () {
          if (askAssignee) askAssignee.value = '';
          askModal.classList.remove('hidden');
        });
      }
      var btnConfirmAsk = document.getElementById('btn-confirm-ask');
      if (btnConfirmAsk) {
        btnConfirmAsk.addEventListener('click', function () {
          var content = askTextarea ? askTextarea.value.trim() : '';
          if (!content) {
            if (askTextarea) askTextarea.focus();
            return;
          }
          var assignee = askAssignee ? askAssignee.value : '';
          var now = new Date();
          var today = now.toISOString().slice(0, 10);
          var timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
          qaList.unshift({
            q: content,
            a: '',
            time: today,
            likes: 0,
            dept: activeDept === 'all' ? 'sales' : activeDept,
            author: '朱总',
            assignee: assignee,
            publishedAt: today + ' ' + timeStr,
            needsAnswer: true
          });
          if (askTextarea) askTextarea.value = '';
          if (askAssignee) askAssignee.value = '';
          if (askCount) askCount.textContent = '0';
          renderQa();
          qaPanel.classList.remove('hidden');
          docPanel.classList.add('hidden');
          askModal.classList.add('hidden');
        });
      }
      document.addEventListener('click', function (e) {
        var btn = e.target.closest('.js-open-answer');
        if (btn) answerModal.classList.remove('hidden');
      });
      document.querySelectorAll('[data-close-ask]').forEach(function (el) {
        el.addEventListener('click', function () { askModal.classList.add('hidden'); });
      });
      document.querySelectorAll('[data-close-answer]').forEach(function (el) {
        el.addEventListener('click', function () { answerModal.classList.add('hidden'); });
      });
      document.addEventListener('keydown', function (e) {
        if (e.key !== 'Escape') return;
        askModal.classList.add('hidden');
        answerModal.classList.add('hidden');
      });
    })();
  </script>
  <script src="./assets/app-shell.js"></script>
</body>
