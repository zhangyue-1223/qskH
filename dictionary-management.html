        },
        {
          id: 'gov-biz-2',
          type: '解除地址异常',
          materials: [
            { name: '营业执照正副本', options: '原件 / 复印件' },
            { name: '法人身份证', options: '正反面扫描件' }
          ],
          createdAt: '2026-04-18 14:22:00',
          creator: '许月'
        },
        {
          id: 'gov-biz-3',
          type: '工商变更',
          materials: [
            { name: '变更申请书', options: '已盖章 / 未盖章' },
            { name: '股东会决议', options: '有 / 无' }
          ],
          createdAt: '2026-04-15 09:10:00',
          creator: '陈莉'
        }
      ];

      var config = {
        contract: {

            { key: 'company', label: '签约公司', btn: '新增公司' },
            { key: 'template', label: '合同模板', btn: '新增模板' }
          ]
        },
        project: {
          tabs: [
            { key: 'agency', label: '代理记账', btn: '新增项目' },
            { key: 'value', label: '增值服务', btn: '新增项目' }
          ]
        },
        'gov-material': {
          standalone: true,
          tabs: [{ key: 'list', label: '', btn: '新增业务' }]
        },
        'tax-material': {
          standalone: true,
          tabs: [{ key: 'list', label: '', btn: '新增资料' }]
        },
        customer: {
          tabs: [
            { key: 'industry', label: '行业类别', btn: '新增类别' },
            { key: 'form', label: '企业形式', btn: '新增类别' },
            { key: 'nature', label: '企业性质', btn: '新增类别' },
            { key: 'source', label: '来源渠道', btn: '新增类别' }
          ]
        },
        approval: {
          tabs: [{ key: 'process', label: '审批审批', btn: '新增审批' }]
        }
      };

      function renderTabs() {
        var menuCfg = config[state.menu];
        var tabs = menuCfg.tabs;
        if (!tabs.some(function (t) { return t.key === state.tab; })) state.tab = tabs[0].key;
        if (menuCfg.standalone) {
          tabsWrap.innerHTML = '';
          if (state.menu === 'gov-material') {
            addBtn.classList.add('hidden');
          } else {
            addBtn.classList.remove('hidden');
            addBtn.textContent = tabs[0].btn || '新增';
          }
          return;
        }
        addBtn.classList.remove('hidden');
        tabsWrap.innerHTML = '';
        tabs.forEach(function (t) {
          var b = document.createElement('button');
          b.type = 'button';
          b.className = 'dict-tab text-sm' + (t.key === state.tab ? ' dict-tab-active' : '');
          b.textContent = t.label;
          b.addEventListener('click', function () { state.tab = t.key; renderTabs(); renderTable(); });
          tabsWrap.appendChild(b);
        });
        var active = tabs.find(function (t) { return t.key === state.tab; });
        addBtn.textContent = active ? active.btn : '新增';
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');

            '<tr class="hover:bg-slate-50"><td class="px-3 py-3 border-b border-slate-100">用款申请</td><td class="px-3 py-3 border-b border-slate-100">部门主管</td><td class="px-3 py-3 border-b border-slate-100">总经理</td><td class="px-3 py-3 border-b border-slate-100">老板</td><td class="px-3 py-3 border-b border-slate-100"><a href="#" class="text-blue-600 hover:underline">修改</a></td></tr>' +
            '</tbody></table>';
        }
        tableWrap.innerHTML = html;
        bindDeleteEvents();
      }

      function setMenu(menuKey) {
        state.menu = menuKey;
        state.tab = config[menuKey].tabs[0].key;
        document.querySelectorAll('[data-menu]').forEach(function (el) {
          var on = el.getAttribute('data-menu') === menuKey;
          el.classList.toggle('dict-menu-active', on);
          if (!on) el.classList.remove('font-semibold', 'text-slate-900');
        });
        renderTabs();
        renderTable();
      }

      function renderAddForm() {
        var title = '新增';
        var fields = '';
        if (state.menu === 'contract' && state.tab === 'company') {
          title = '签约公司';
          fields =
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">公司名称 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入公司名称"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">开户银行 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入开户银行"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">银行账号 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入银行账号"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">设为默认 <span class="text-red-500">*</span></label><div class="flex gap-16"><label class="inline-flex items-center gap-2"><input type="radio" name="is-default" checked>是</label><label class="inline-flex items-center gap-2"><input type="radio" name="is-default">否</label></div></div>';
        } else if (state.menu === 'contract' && state.tab === 'template') {
          title = '新增模板';
          fields =
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">合同名称 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入合同名称"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">模板文件 <span class="text-red-500">*</span></label><button type="button" class="h-10 rounded border border-dashed border-sky-300 bg-sky-50 text-blue-600 text-sm"><i class="fa-solid fa-circle-plus mr-2"></i>上传模板</button></div>';
        } else if (state.menu === 'tax-material') {
          title = '新增资料';
          fields =
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">资料名称 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入资料名称"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">是否必填 <span class="text-red-500">*</span></label><div class="flex gap-16"><label class="inline-flex items-center gap-2"><input type="radio" name="material-required" checked>是</label><label class="inline-flex items-center gap-2"><input type="radio" name="material-required">否</label></div></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-start gap-3"><label class="text-right text-slate-600 pt-2">备注</label><textarea rows="3" class="rounded border border-slate-200 px-3 py-2" placeholder="输入备注说明"></textarea></div>';
        } else if (state.menu === 'project') {
          title = '新增项目';
          fields =
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">项目名称 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入项目名称"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">项目类型 <span class="text-red-500">*</span></label><button type="button" class="h-9 rounded-md border border-slate-200 bg-white hover:bg-slate-50 cursor-pointer px-3 text-left flex items-center justify-between">' + (state.tab === 'agency' ? '代理记账' : '增值服务') + '<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">标准价</label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入价格"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-start gap-3"><label class="text-right text-slate-600 pt-2">说明</label><textarea rows="3" class="rounded border border-slate-200 px-3 py-2" placeholder="输入说明"></textarea></div>';
        } else if (state.menu === 'customer') {
          title = '新增类别';
          fields = '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">类别名称 <span class="text-red-500">*</span></label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入类别名称"></div>';
        } else {
          title = '新增审批';
          fields =
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">审批名称</label><input class="h-9 rounded border border-slate-200 px-3" placeholder="输入审批名称"></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">初审批人</label><button type="button" class="h-9 rounded-md border border-slate-200 bg-white hover:bg-slate-50 cursor-pointer px-3 text-left flex items-center justify-between">请选择<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">复审批人</label><button type="button" class="h-9 rounded-md border border-slate-200 bg-white hover:bg-slate-50 cursor-pointer px-3 text-left flex items-center justify-between">请选择<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></div>' +
            '<div class="grid grid-cols-[100px_1fr] items-center gap-3"><label class="text-right text-slate-600">抄送人</label><button type="button" class="h-9 rounded-md border border-slate-200 bg-white hover:bg-slate-50 cursor-pointer px-3 text-left flex items-center justify-between">请选择<i class="fa-solid fa-angle-down text-xs text-slate-400"></i></button></div>';
        }
        addTitle.textContent = title;
        addFields.innerHTML = fields;
      }

      function openAddModal() {
        renderAddForm();
        addModal.classList.remove('hidden');
        addModal.classList.add('flex');
      }
      function closeAddModal() {
        addModal.classList.add('hidden');
        addModal.classList.remove('flex');
      }

      function openDeleteModal() {
        delModal.classList.remove('hidden');
        delModal.classList.add('flex');
      }
      function closeDeleteModal() {
        delModal.classList.add('hidden');
        delModal.classList.remove('flex');
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.remove('hidden');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(function () { toast.classList.add('hidden'); }, 1800);
      }

      function bindDeleteEvents() {
        tableWrap.querySelectorAll('.js-dict-delete').forEach(function (btn) {
          btn.addEventListener('click', function () {
            pendingDeleteGovId = btn.getAttribute('data-gov-id') || null;
            openDeleteModal();
          });
        });
      }

      document.querySelectorAll('[data-menu]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          setMenu(btn.getAttribute('data-menu'));
        });
      });

      addBtn.addEventListener('click', function () {
        openAddModal();
      });

      var govBatchImportFile = document.getElementById('gov-batch-import-file');
      if (govBatchImportFile) {
        govBatchImportFile.addEventListener('change', function () {
          if (govBatchImportFile.files && govBatchImportFile.files.length) {
            showToast('批量导入成功');
            govBatchImportFile.value = '';
          }
        });
      }

      document.getElementById('btn-gov-add-checklist-item').addEventListener('click', function () {
        var count = govChecklistWrap.children.length;
        govChecklistWrap.appendChild(createChecklistItemEl({ name: '', options: '' }, count));
      });

      if (govBizModal) {
        govBizModal.querySelectorAll('[data-close-gov-business]').forEach(function (el) {
          el.addEventListener('click', closeGovBusinessModal);
        });
      }
      if (govBizForm) {
        govBizForm.addEventListener('submit', function (e) {
          e.preventDefault();
          var name = govBizNameInput ? govBizNameInput.value.trim() : '';
          if (!name) {
            showToast('请填写业务名称');
            return;
          }
          var materials = collectChecklistFromForm();
          if (!materials.length) {
            showToast('请配置至少一项所需资料');
            return;
          }
          var invalid = materials.some(function (m) { return !m.name || !m.options; });
          if (invalid) {
            showToast('请完善每项资料的名称与选项配置');
            return;
          }
          if (govEditingId) {
            var existing = govBusinessRows.find(function (r) { return r.id === govEditingId; });
            if (existing) {
              existing.type = name;
              existing.materials = materials;
            }
            showToast('保存成功');
          } else {
            govBusinessRows.unshift({
              id: 'gov-biz-' + Date.now(),
              type: name,
              materials: materials,
              createdAt: new Date().toISOString().slice(0, 19).replace('T', ' '),
              creator: '祝哥'
            });
            showToast('新增成功');
          }
          closeGovBusinessModal();
          govFilterType = '';
          renderTable();
        });
      }

      addModal.querySelectorAll('[data-close-add]').forEach(function (el) {
        el.addEventListener('click', closeAddModal);
      });
      addForm.addEventListener('submit', function (e) {
        e.preventDefault();
        closeAddModal();
        showToast('提交成功');
      });

      delModal.querySelectorAll('[data-close-delete]').forEach(function (el) {
        el.addEventListener('click', closeDeleteModal);
      });
      document.getElementById('btn-confirm-delete').addEventListener('click', function () {
        if (pendingDeleteGovId && state.menu === 'gov-material') {
          govBusinessRows = govBusinessRows.filter(function (r) { return r.id !== pendingDeleteGovId; });
          pendingDeleteGovId = null;
          renderTable();
        }
        closeDeleteModal();
        showToast('删除成功');
      });

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') {
          if (!addModal.classList.contains('hidden')) closeAddModal();
          if (govBizModal && !govBizModal.classList.contains('hidden')) closeGovBusinessModal();
          if (!delModal.classList.contains('hidden')) closeDeleteModal();
        }
      });

      setMenu('contract');
    })();
  </script>
  <script src="./assets/app-shell.js"></script>
</body>
</html>
