<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编辑客户信息 - 企税康协同工作平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
    .field-label { font-size: 12px; color: #334155; margin-bottom: 4px; display: block; }
    .field-input { height: 34px; width: 100%; border: 1px solid #e2e8f0; border-radius: 4px; padding: 0 10px; font-size: 12px; color: #0f172a; }
    .field-input::placeholder, .field-textarea::placeholder { color: #94a3b8; }
    .field-textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 4px; padding: 8px 10px; font-size: 12px; color: #0f172a; resize: none; }
    .upload-card { height: 86px; border: 1px solid #dbeafe; border-radius: 4px; background: #f0f7ff; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: #0ea5e9; font-size: 11px; }
  </style>
</head>
<body class="bg-slate-100 text-slate-700">
  <div class="min-h-screen w-full flex">
    <aside class="w-64 bg-slate-900 text-slate-200 flex flex-col shrink-0">
      <div class="h-16 px-3 flex items-center border-b border-slate-800">
        <div class="w-full rounded-lg bg-white px-2 py-1.5 flex items-center justify-center">
          <img src="./assets/qishuikang-logo.png" alt="企税康Logo" class="h-8 w-full max-h-8 object-contain object-center mix-blend-multiply">
        </div>
      </div>
      <nav class="flex-1 py-4 text-sm overflow-y-auto">
        <a class="mx-3 mb-1 h-10 px-4 rounded-lg hover:bg-slate-800 flex items-center" href="index.html"><i class="fa-solid fa-table-columns w-5 mr-2"></i>工作台</a>
        <details class="mx-3 mb-1 group" open>
          <summary class="list-none cursor-pointer h-10 px-4 rounded-lg bg-slate-800/80 flex items-center justify-between text-white [&::-webkit-details-marker]:hidden">
            <span class="flex items-center"><i class="fa-solid fa-building-user w-5 mr-2"></i>客户中心</span>
            <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 transition-transform group-open:rotate-180"></i>
          </summary>
          <div class="mt-1 ml-2 pl-3 border-l border-slate-700 space-y-0.5">
            <a class="block py-2 px-3 rounded-lg text-sm text-slate-300 hover:bg-slate-800 hover:text-white" href="lead-management.html">线索管理</a>
            <a class="block py-2 px-3 rounded-lg text-sm bg-blue-600 text-white font-medium" href="customer-management.html">客户管理</a>
          </div>
        </details>
      </nav>
    </aside>

    <main class="flex-1 p-5">
      <div class="mb-3 text-xs text-slate-500">客户中心 / 客户管理 / <span class="text-slate-700">编辑信息</span></div>
      <div class="rounded-xl border border-slate-200 bg-white p-4">
        <div class="mb-4 flex items-center justify-between border-b border-slate-100 pb-3">
          <div class="flex items-center gap-2">
            <a href="customer-management.html" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-angle-left text-sm"></i></a>
            <h2 class="text-sm font-semibold text-slate-800">编辑信息</h2>
          </div>
          <a href="customer-management.html" class="text-xs text-blue-600 hover:underline">返回列表</a>
        </div>

      <div class="grid grid-cols-3 gap-x-4 gap-y-2.5">
        <label><span class="field-label">公司名称</span><input class="field-input" placeholder="请输入公司名称"></label>
        <label><span class="field-label">法定代表人</span><input class="field-input" placeholder="请输入法定代表人姓名"></label>
        <label><span class="field-label">联系电话</span><input class="field-input" placeholder="请输入联系电话"></label>

        <label><span class="field-label">身份证号码</span><input class="field-input" placeholder="请输入身份证号码"></label>
        <label><span class="field-label">股份占比（%）</span><input class="field-input" placeholder="请输入股份占比"></label>
        <label><span class="field-label">联系电话</span><input class="field-input" placeholder="请输入联系电话"></label>

        <label><span class="field-label">联系方式</span><input class="field-input" placeholder="请输入联系方式"></label>
        <div>
          <span class="field-label">主体类型</span>
          <div class="field-input flex items-center gap-4">
            <label class="inline-flex items-center gap-1.5 text-xs text-slate-600"><input type="checkbox"> 自然人</label>
            <label class="inline-flex items-center gap-1.5 text-xs text-slate-600"><input type="checkbox" checked> 公司</label>
          </div>
        </div>
        <label><span class="field-label">股份占比（%）</span><input class="field-input" placeholder="请输入股份占比"></label>

        <label><span class="field-label">企业账号</span><input class="field-input" placeholder="请输入企业账号"></label>
        <label><span class="field-label">法定代表人</span><input class="field-input" placeholder="请输入法定代表人姓名"></label>
        <label><span class="field-label">身份证号码</span><input class="field-input" placeholder="请输入身份证号码"></label>

        <label><span class="field-label">联系电话</span><input class="field-input" placeholder="请输入联系电话"></label>
        <div class="pt-5"><button type="button" class="text-xs text-blue-600 hover:underline">+ 添加股东</button></div>
        <div></div>

        <label><span class="field-label">内部财务</span><input class="field-input" placeholder="请输入财务姓名"></label>
        <label><span class="field-label">股份占比（%）</span><input class="field-input" placeholder="请输入股份占比"></label>
        <label><span class="field-label">联系电话</span><input class="field-input" placeholder="请输入联系电话"></label>

        <label><span class="field-label">身份证号码</span><input class="field-input" placeholder="请输入身份证号码"></label>
        <label><span class="field-label">注册资本（万）</span><input class="field-input" placeholder="请输入注册资本"></label>
        <label><span class="field-label">注册地址</span><input class="field-input" placeholder="例: XX广场，租金年合同期第一到"></label>

        <label class="col-span-3">
          <span class="field-label">经营范围</span>
          <textarea rows="2" class="field-textarea" placeholder="请输入经营范围"></textarea>
        </label>
      </div>

      <div class="mt-4 grid grid-cols-6 gap-x-3 gap-y-2 text-xs">
        <div>
          <p class="mb-1 text-slate-600">法人身份证正</p>
          <div class="upload-card"><i class="fa-solid fa-circle-plus text-lg"></i><span>上传身份证正面</span></div>
        </div>
        <div>
          <p class="mb-1 text-slate-600">法人身份证反</p>
          <div class="upload-card"><i class="fa-solid fa-circle-plus text-lg"></i><span>上传身份证反面</span></div>
        </div>
        <div>
          <p class="mb-1 text-slate-600">营业执照（需上传原件）</p>
          <div class="upload-card"><i class="fa-solid fa-circle-plus text-lg"></i><span>上传营业执照</span></div>
        </div>
        <div class="col-span-3">
          <p class="mb-1 text-slate-600">其他附件（图片） <span class="text-slate-400">3M以内，png格式图片上传</span></p>
          <div class="w-[96px] upload-card"><i class="fa-solid fa-circle-plus text-lg"></i><span>上传图片</span></div>
        </div>
        <div class="col-span-3">
          <p class="mb-1 text-slate-600">其他附件（文件） <span class="text-slate-400">支持word和pdf上传</span></p>
          <div class="w-[96px] upload-card"><i class="fa-solid fa-circle-plus text-lg"></i><span>上传文件</span></div>
        </div>
      </div>

        <div class="mt-6 flex justify-center gap-3">
          <button class="h-8 rounded bg-blue-600 px-6 text-xs text-white">提交信息</button>
          <a href="customer-management.html" class="h-8 rounded border border-slate-200 bg-white px-6 text-xs text-slate-600 inline-flex items-center">取消</a>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
