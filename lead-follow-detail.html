      function stepIcon(step, isLast) {
        if (step.type === 'following') return '<span class="timeline-icon bg-orange-500 text-white"><i class="fa-solid fa-spinner text-[14px]"></i></span>';
        if (step.type === 'convert-opp') return '<span class="timeline-icon bg-blue-500 text-white"><i class="fa-solid fa-arrow-right-arrow-left text-[13px]"></i></span>';
        if (step.type === 'won') return '<span class="timeline-icon bg-emerald-500 text-white"><i class="fa-solid fa-check text-[16px]"></i></span>';
        if (step.type === 'abandon') return '<span class="timeline-icon bg-red-500 text-white"><i class="fa-solid fa-xmark text-[16px]"></i></span>';
        if (step.type === 'first-follow' && step.valid === false) return '<span class="timeline-icon bg-slate-400 text-white"><i class="fa-solid fa-ban text-[14px]"></i></span>';
        return '<span class="timeline-icon bg-emerald-500 text-white"><i class="fa-solid fa-check text-[16px]"></i></span>';
      }

      function renderStepBody(step) {
        var html = '';
        if (step.type === 'create') {
          html = '<p class="text-sm font-medium text-slate-800">线索创建</p>' +
            '<p class="text-[13px] text-slate-600 mt-1">创建人：<span class="text-slate-800">' + step.creator + '</span></p>';
          if (step.valid !== undefined) {
            html += '<p class="text-[13px] text-slate-600 mt-1">线索' + (step.valid ? '<span class="text-emerald-600 font-medium">有效</span>' : '<span class="text-slate-500 font-medium">无效</span>') + '</p>';
          }
          if (step.content) {
            html += '<p class="text-[13px] text-slate-600 mt-1">跟进内容：<span class="text-slate-800">' + step.content + '</span></p>';
          }
          html += '<p class="text-[13px] text-slate-400 mt-0.5">' + step.time + '</p>';
        } else if (step.type === 'first-follow') {
          html = '<p class="text-sm font-medium text-slate-800">跟进记录</p>';
          if (step.valid) {
            html += '<p class="text-[13px] text-slate-600 mt-1">跟进内容：<span class="text-slate-800">' + step.content + '</span></p>';
          } else {
            html += '<p class="text-[13px] text-slate-600 mt-1">无效说明：<span class="text-slate-800">' + step.reason + '</span></p>';
          }
          html += '<p class="text-[13px] text-slate-400 mt-0.5">跟进时间：' + step.time + '</p>';
        } else if (step.type === 'follow') {
          html = '<p class="text-sm font-medium text-slate-800">跟进记录</p>' +
            '<p class="text-[13px] text-slate-600 mt-1">跟进内容：<span class="text-slate-800">' + step.content + '</span></p>' +
            '<p class="text-[13px] text-slate-400 mt-0.5">跟进时间：' + step.time + '</p>';
        } else if (step.type === 'contract') {
          html = '<p class="text-sm font-medium text-slate-800">合同已签署</p>' +
            '<div class="mt-2"><a href="contract-management.html" class="inline-flex items-center rounded border border-blue-200 bg-blue-50 px-2.5 py-1 text-xs text-blue-600 hover:bg-blue-100">查看合同</a></div>' +
            '<p class="text-[13px] text-slate-400 mt-1">' + step.time + '</p>';
        } else if (step.type === 'payment') {
          html = '<p class="text-sm font-medium text-slate-800">订单已支付</p>' +
            '<p class="text-[13px] text-slate-600 mt-1">支付时间：<span class="text-slate-800">' + step.payTime + '</span></p>';
        } else if (step.type === 'won') {
          html = '<p class="text-sm font-medium text-emerald-700">已成单</p>' +
            '<p class="text-[13px] text-slate-400 mt-0.5">' + step.time + '</p>';
        } else if (step.type === 'following') {
          html = '<p class="text-sm font-medium text-orange-600">跟进中</p>';
          if (step.nextTime) {
            html += '<p class="text-[13px] text-slate-600 mt-1">下次跟进：<span class="text-slate-800">' + formatCnDate(step.nextTime) + '</span></p>';
          }
          html += '<p class="text-[13px] text-slate-400 mt-0.5">' + step.time + '</p>';
        } else if (step.type === 'convert-opp') {
          html = '<p class="text-sm font-medium text-blue-700">已转商机</p>' +
            '<p class="text-[13px] text-slate-600 mt-1">线索已转为商机，后续在商机管理中跟进</p>' +
            '<p class="text-[13px] text-slate-400 mt-0.5">' + step.time + '</p>';
        } else if (step.type === 'abandon') {
          html = '<p class="text-sm font-medium text-red-600">放弃</p>' +
            '<p class="text-[13px] text-slate-600 mt-1">放弃说明：<span class="text-slate-800">' + step.reason + '</span></p>' +
            '<p class="text-[13px] text-slate-400 mt-0.5">' + step.time + '</p>';
        }
        return html;
      }

      function renderTimeline(steps) {
        return steps.map(function (step, i) {
          var isLast = i === steps.length - 1;
          return '<div class="timeline-step relative pl-12 pb-10' + (isLast ? ' last:pb-0' : '') + '">' +
            (!isLast ? '<div class="timeline-line"></div>' : '') +
            '<div class="absolute left-0 top-0">' + stepIcon(step, isLast) + '</div>' +
            '<div>' + renderStepBody(step) + '</div>' +
            '</div>';
        }).join('');
      }

      var params = new URLSearchParams(location.search);
      var id = params.get('id') || 'lead-1';
      if (!dataMap[id]) id = 'lead-1';
      var data = dataMap[id];

      var badge = document.getElementById('status-badge');
      badge.className = 'inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium ' + data.statusCls;
      badge.textContent = data.status;

      var infoEl = document.getElementById('lead-info');
      infoEl.innerHTML = Object.keys(data.info).map(function (k) {
        return '<div class="py-0.5"><p class="text-xs text-slate-500 mb-1">' + k + '</p><p class="text-sm text-slate-800">' + data.info[k] + '</p></div>';
      }).join('');
      document.getElementById('follow-form').classList.toggle('hidden', !data.showForm);
      document.getElementById('timeline').innerHTML = renderTimeline(data.steps);

      var idx = order.indexOf(id);
      var prev = idx > 0 ? order[idx - 1] : null;
      var next = idx < order.length - 1 ? order[idx + 1] : null;
      var btnPrev = document.getElementById('btn-prev');
      var btnNext = document.getElementById('btn-next');

      btnPrev.disabled = !prev;
      btnNext.disabled = !next;
      if (!prev) btnPrev.classList.add('opacity-50', 'cursor-not-allowed');
      if (!next) btnNext.classList.add('opacity-50', 'cursor-not-allowed');

      btnPrev.addEventListener('click', function () { if (prev) location.href = 'lead-follow-detail.html?id=' + prev; });
      btnNext.addEventListener('click', function () { if (next) location.href = 'lead-follow-detail.html?id=' + next; });

      function bindDetailCounter(inputId, lenId, max) {
        var inp = document.getElementById(inputId);
        var len = document.getElementById(lenId);
        if (!inp || !len) return;
        function upd() { len.textContent = String(Math.min(inp.value.length, max)); }
        inp.addEventListener('input', upd);
        upd();
      }
      bindDetailCounter('detail-follow-content', 'detail-follow-len', 1000);
      bindDetailCounter('detail-invalid-reason', 'detail-invalid-len', 1000);
      bindDetailCounter('detail-abandon-reason', 'detail-abandon-len', 1000);

      function setDetailBlockVisible(el, show) {
        if (!el) return;
        el.classList.toggle('hidden', !show);
      }

      function updateDetailFollowFields() {
        var validSel = document.getElementById('detail-follow-valid');
        var resultSel = document.getElementById('detail-follow-result');
        var resultRow = document.getElementById('detail-result-row');
        var nextTimeRow = document.getElementById('detail-next-time-row');
        var validBlock = document.getElementById('detail-valid-fields');
        var invalidBlock = document.getElementById('detail-invalid-fields');
        var abandonBlock = document.getElementById('detail-abandon-fields');
        if (!validSel) return;
        var isValid = validSel.value === 'valid';
        var isAbandoned = resultSel && resultSel.value === 'abandoned';

        if (!isValid) {
          setDetailBlockVisible(resultRow, false);
          setDetailBlockVisible(nextTimeRow, false);
          setDetailBlockVisible(validBlock, false);
          setDetailBlockVisible(abandonBlock, false);
          setDetailBlockVisible(invalidBlock, true);
        } else if (isAbandoned) {
          setDetailBlockVisible(resultRow, true);
          setDetailBlockVisible(nextTimeRow, false);
          setDetailBlockVisible(validBlock, false);
          setDetailBlockVisible(invalidBlock, false);
          setDetailBlockVisible(abandonBlock, true);
        } else {
          setDetailBlockVisible(resultRow, true);
          setDetailBlockVisible(nextTimeRow, true);
          setDetailBlockVisible(validBlock, true);
          setDetailBlockVisible(invalidBlock, false);
          setDetailBlockVisible(abandonBlock, false);
        }
      }
      var detailFollowValid = document.getElementById('detail-follow-valid');
      var detailFollowResult = document.getElementById('detail-follow-result');
      if (detailFollowValid) {
        detailFollowValid.addEventListener('change', updateDetailFollowFields);
      }
      if (detailFollowResult) {
        detailFollowResult.addEventListener('change', updateDetailFollowFields);
      }
      updateDetailFollowFields();

      var addFollowBtn = document.getElementById('btn-add-follow');
      if (addFollowBtn) {
        addFollowBtn.addEventListener('click', function () {
          var toast = document.getElementById('follow-toast');
          toast.classList.remove('hidden');
          setTimeout(function () { toast.classList.add('hidden'); }, 1800);
        });
      }
    })();
  </script>
  <script src="./assets/app-shell.js"></script>
</body>
</html>
